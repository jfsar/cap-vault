<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#2c3e50" stroke="#34495e" stroke-width="3"/>
  
  <!-- Cap illustration -->
  <g transform="translate(100, 90)">
    <!-- Cap brim -->
    <ellipse cx="0" cy="25" rx="55" ry="12" fill="#e74c3c" opacity="0.8"/>
    
    <!-- Cap crown base -->
    <path d="M -45 25 Q -45 10, -35 0 L 35 0 Q 45 10, 45 25 Z" fill="#e74c3c"/>
    
    <!-- Cap crown top panels -->
    <path d="M -35 0 Q -30 -25, 0 -30 Q 30 -25, 35 0 Z" fill="#c0392b"/>
    
    <!-- Cap button on top -->
    <circle cx="0" cy="-30" r="4" fill="#95a5a6"/>
    
    <!-- Stitching lines for detail -->
    <path d="M -25 0 Q -20 -20, 0 -25" fill="none" stroke="#95a5a6" stroke-width="0.5" opacity="0.5"/>
    <path d="M 25 0 Q 20 -20, 0 -25" fill="none" stroke="#95a5a6" stroke-width="0.5" opacity="0.5"/>
    <path d="M 0 -25 L 0 0" fill="none" stroke="#95a5a6" stroke-width="0.5" opacity="0.5"/>
    
    <!-- Highlight on crown -->
    <ellipse cx="-15" cy="-10" rx="8" ry="12" fill="#ffffff" opacity="0.15"/>
  </g>
  

</svg>